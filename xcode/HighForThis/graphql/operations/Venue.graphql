query Venue($slug: String!) {
  attended: shows(attended: true, first: 200, venue: { slug: $slug }) {
    edges {
      node {
        ...ShowList_show
      }
    }
  }
  shows(first: 200, latest: true, venue: { slug: $slug }) {
    edges {
      node {
        ...ShowList_show
      }
    }
  }
  venue(slug: $slug) {
    id
    address
    capacity
    name
    slug
    website
    coordinates {
      latitude
      longitude
    }
  }
}
