query Artist($slug: String!) {
  artist(slug: $slug) {
    id
    name
    slug
    website
    appleMusic {
      id
      url
      artwork {
        height
        url
        width
      }
    }
  }
  attended: shows(artist: { slug: $slug }, attended: true, first: 200) {
    edges {
      node {
        ...ShowList_show
      }
    }
  }
  shows(artist: { slug: $slug }, first: 200, latest: true) {
    edges {
      node {
        ...ShowList_show
      }
    }
  }
}
