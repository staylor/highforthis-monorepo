query Post($slug: String!) {
  post(slug: $slug) {
    id
    slug
    summary
    title
    editorState {
      root {
        direction
        format
        indent
        type
        version
        children {
          ... on ElementNodeType {
            direction
            format
            indent
            type
            version
          }
          ... on HeadingNode {
            tag
            children {
              ...TextNodes_linebreakNode
              ...TextNodes_textNode
            }
          }
          ... on ImageNode {
            image {
              id
              destination
              crops {
                fileName
                height
                width
              }
            }
          }
          ... on VideoNode {
            video {
              ...Video_video
            }
          }
          ... on ElementNode {
            children {
              ...TextNodes_linebreakNode
              ...TextNodes_textNode
            }
          }
        }
      }
    }
    featuredMedia {
      id
      destination
      ... on ImageUpload {
        crops {
          fileName
          width
        }
      }
    }
  }
}
