schema {
  query: Query
  mutation: Mutation
}

directive @cache(key: String = "") on FIELD

type APIKeys {
  googleMaps: String
}

type AppleMusicArtwork {
  bgColor: String
  height: Int
  textColor1: String
  textColor2: String
  textColor3: String
  textColor4: String
  url: String
  width: Int
}

input AppleMusicArtworkInput {
  bgColor: String
  height: Int
  textColor1: String
  textColor2: String
  textColor3: String
  textColor4: String
  url: String
  width: Int
}

type AppleMusicData {
  artwork: AppleMusicArtwork
  genreNames: [String!]
  id: String
  url: String
}

input AppleMusicDataInput {
  artwork: AppleMusicArtworkInput
  genreNames: [String!]
  id: String
  url: String
}

type Artist {
  appleMusic: AppleMusicData
  description: String
  excludeFromSearch: Boolean
  featuredMedia: [MediaUpload!]
  id: String!
  name: String!
  slug: String!
  website: String
}

type ArtistConnection {
  count: Int!
  edges: [ArtistEdge!]!
  pageInfo: PageInfo!
}

type ArtistEdge {
  cursor: String!
  node: Artist!
}

type AudioUpload implements MediaUpload {
  album: String
  albumArtist: [String]
  artist: [String]
  description: String
  destination: String!
  duration: Float
  fileName: String!
  fileSize: Int!
  genre: [String]
  id: String!
  images: [ImageUploadCrop]
  mimeType: String!
  originalName: String!
  title: String
  type: String!
  year: Int
}

type CodeNode implements ElementNodeType & LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  indent: Int
  language: String
  type: String
  version: Int
}

input CreateArtistInput {
  description: String
  excludeFromSearch: Boolean
  featuredMedia: [String]
  name: String!
  slug: String
  website: String
}

input CreatePodcastInput {
  audio: String
  date: Float
  description: String
  image: String
  title: String!
}

input CreatePostInput {
  artists: [String]
  date: Float
  editorState: EditorStateInput
  featuredMedia: [String]
  status: PostStatus
  summary: String
  title: String!
}

input CreateShowInput {
  artists: [String!]!
  attended: Boolean
  date: Float!
  notes: String
  title: String
  url: String
  venue: String!
}

input CreateUserInput {
  bio: String
  email: String
  name: String
  password: String
  roles: [String]
}

input CreateVenueInput {
  capacity: String
  city: String
  coordinates: VenueCoordinatesInput
  description: String
  excludeFromSearch: Boolean
  featuredMedia: [String]
  name: String!
  permanentlyClosed: Boolean
  postalCode: String
  slug: String
  state: String
  streetAddress: String
  website: String
}

input CreateVideoInput {
  dataId: String
  dataPlaylistId: String
  dataType: String
  position: Int
  publishedAt: Float!
  publishedISO: String
  slug: String!
  title: String!
  year: Int!
}

type DashboardSettings {
  googleClientId: String
  googleTrackingId: String
  id: String!
}

input DashboardSettingsInput {
  googleClientId: String
  googleTrackingId: String
}

union EditorNode = CodeNode | ElementNode | HeadingNode | ImageNode | LinebreakNode | QuoteNode | TextNode | VideoNode

input EditorNodeInput {
  children: [EditorNodeInput]
  detail: Int
  direction: ElementDirection
  format: Int
  imageId: String
  indent: Int
  language: String
  mode: TextModeType
  size: String
  style: String
  tag: HeadingTag
  text: String
  textFormat: Int
  textStyle: String
  type: String
  version: Int
  videoId: String
}

type EditorState {
  root: ElementNode
}

input EditorStateInput {
  root: RootNodeInput
}

enum ElementDirection {
  ltr
  rtl
}

type ElementNode implements ElementNodeType & LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  indent: Int
  type: String
  version: Int
}

input ElementNodeInput {
  children: [EditorNodeInput]
  direction: ElementDirection
  format: Int
  indent: Int
  type: String
  version: Int
}

interface ElementNodeType implements LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  indent: Int
  type: String
  version: Int
}

input EntityArg {
  id: String
  slug: String
}

type FileUpload implements MediaUpload {
  description: String
  destination: String!
  fileName: String!
  fileSize: Int!
  id: String!
  mimeType: String!
  originalName: String!
  title: String
  type: String!
}

type HeadingNode implements ElementNodeType & LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  indent: Int
  tag: HeadingTag
  type: String
  version: Int
}

enum HeadingTag {
  h1
  h2
  h3
  h4
  h5
  h6
}

type ImageNode implements ElementNodeType & LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  image: ImageUpload
  indent: Int
  size: String
  type: String
  version: Int
}

type ImageUpload implements MediaUpload {
  altText: String
  caption: String
  crops: [ImageUploadCrop!]!
  destination: String!
  fileName: String!
  fileSize: Int!
  height: Int
  id: String!
  mimeType: String!
  originalName: String!
  title: String
  type: String!
  width: Int
}

type ImageUploadCrop {
  fileName: String!
  fileSize: Int!
  height: Int!
  width: Int!
}

input ImageUploadCropInput {
  fileName: String
  fileSize: Int
  height: Int
  width: Int
}

interface LexicalNode {
  type: String
  version: Int
}

type LinebreakNode implements LexicalNode {
  type: String
  version: Int
}

type MediaCropSetting {
  height: Int
  name: String!
  width: Int
}

input MediaCropSettingInput {
  height: Int
  name: String
  width: Int
}

type MediaSettings {
  crops: [MediaCropSetting!]!
  id: String!
}

input MediaSettingsInput {
  crops: [MediaCropSettingInput]
}

interface MediaUpload {
  destination: String!
  fileName: String!
  fileSize: Int!
  id: String!
  mimeType: String!
  originalName: String!
  title: String
  type: String!
}

type MediaUploadConnection {
  count: Int!
  edges: [MediaUploadEdge!]!
  mimeTypes: [String!]
  pageInfo: PageInfo!
  types: [String!]
}

type MediaUploadEdge {
  cursor: String!
  node: MediaUpload!
}

type Mutation {
  createArtist(input: CreateArtistInput!): Artist
  createPodcast(input: CreatePodcastInput!): Podcast
  createPost(input: CreatePostInput!): Post
  createShow(input: CreateShowInput!): Show
  createUser(input: CreateUserInput!): User
  createVenue(input: CreateVenueInput!): Venue
  createVideo(input: CreateVideoInput!): Video
  removeArtist(ids: [String]!): Boolean
  removeMediaUpload(ids: [String]!): Boolean
  removePodcast(ids: [String]!): Boolean
  removePost(ids: [String]!): Boolean
  removeShow(ids: [String]!): Boolean
  removeUser(ids: [String]!): Boolean
  removeVenue(ids: [String]!): Boolean
  removeVideo(ids: [String]!): Boolean
  updateArtist(id: String!, input: UpdateArtistInput!): Artist
  updateDashboardSettings(id: String!, input: DashboardSettingsInput!): DashboardSettings
  updateMediaSettings(id: String!, input: MediaSettingsInput!): MediaSettings
  updateMediaUpload(id: String!, input: UpdateMediaUploadInput!): MediaUpload
  updatePodcast(id: String!, input: UpdatePodcastInput!): Podcast
  updatePodcastSettings(id: String!, input: PodcastSettingsInput!): PodcastSettings
  updatePost(id: String!, input: UpdatePostInput!): Post
  updateShow(id: String!, input: UpdateShowInput!): Show
  updateSiteSettings(id: String!, input: SiteSettingsInput!): SiteSettings
  updateUser(id: String!, input: UpdateUserInput!): User
  updateVenue(id: String!, input: UpdateVenueInput!): Venue
  updateVideo(id: String!, input: UpdateVideoInput!): Video
}

"""Id representation, based on Mongo Object Ids"""

type PageInfo {
  endCursor: String
  hasNextPage: Boolean
  hasPreviousPage: Boolean
  startCursor: String
}

type Podcast {
  audio: AudioUpload
  date: Float
  description: String!
  id: String!
  image: ImageUpload
  title: String!
}

type PodcastConnection {
  count: Int!
  edges: [PodcastEdge!]!
  pageInfo: PageInfo!
}

type PodcastEdge {
  cursor: String!
  node: Podcast!
}

enum PodcastOrder {
  ASC
  DESC
}

type PodcastSettings {
  category: String
  copyrightText: String
  description: String
  explicit: String
  feedLink: String
  generator: String
  id: String!
  image: ImageUpload
  itunesEmail: String
  itunesName: String
  language: String
  managingEditor: String
  title: String
  websiteLink: String
}

input PodcastSettingsInput {
  category: String
  copyrightText: String
  description: String
  explicit: String
  feedLink: String
  generator: String
  image: String
  itunesEmail: String
  itunesName: String
  language: String
  managingEditor: String
  title: String
  websiteLink: String
}

type Post {
  artists: [Artist]
  date: Float
  editorState: EditorState
  featuredMedia: [MediaUpload!]
  id: String!
  slug: String!
  status: PostStatus
  summary: String
  title: String!
}

type PostConnection {
  count: Int!
  edges: [PostEdge!]!
  pageInfo: PageInfo!
}

type PostEdge {
  cursor: String!
  node: Post!
}

enum PostStatus {
  DRAFT
  PUBLISH
}

type Query {
  apiKeys: APIKeys
  artist(id: String, slug: String): Artist
  artists(after: String, before: String, filtered: Boolean, first: Int, last: Int, search: String): ArtistConnection
  dashboardSettings: DashboardSettings!
  media(id: String): MediaUpload
  mediaSettings: MediaSettings!
  podcast(id: String, slug: String): Podcast
  podcastSettings: PodcastSettings!
  podcasts(after: String, before: String, first: Int, last: Int, order: PodcastOrder, search: String): PodcastConnection
  post(id: String, slug: String): Post
  posts(after: String, before: String, first: Int, last: Int, search: String, status: PostStatus, year: Int): PostConnection
  show(id: String, lastAdded: Boolean, slug: String): Show
  showStats(entity: ShowEntityType!): [ShowStat!]!
  shows(after: String, artist: EntityArg, attended: Boolean, before: String, date: Float, first: Int, last: Int, latest: Boolean, order: ShowOrder, search: String, venue: EntityArg, year: Int): ShowConnection
  siteSettings: SiteSettings!
  uploads(after: String, before: String, first: Int, last: Int, mimeType: String, search: String, type: String): MediaUploadConnection
  user(id: String!): User
  users(after: String, before: String, first: Int, last: Int, search: String): UserConnection
  venue(id: String, slug: String): Venue
  venues(after: String, before: String, filtered: Boolean, first: Int, last: Int, search: String): VenueConnection
  video(id: String, slug: String): Video
  videos(after: String, before: String, first: Int, last: Int, search: String, year: Int): VideoConnection
}

type QuoteNode implements ElementNodeType & LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  indent: Int
  type: String
  version: Int
}

input RootNodeInput {
  children: [EditorNodeInput]
  direction: ElementDirection
  format: Int
  indent: Int
  type: String
  version: Int
}

type Show {
  artists: [Artist!]!
  attended: Boolean
  date: Float!
  id: String!
  notes: String
  title: String
  url: String
  venue: Venue!
}

type ShowConnection {
  count: Int
  edges: [ShowEdge!]!
  pageInfo: PageInfo!
  years: [Int!]
}

type ShowEdge {
  cursor: String!
  node: Show!
}

union ShowEntity = Artist | Venue

enum ShowEntityType {
  ARTIST
  VENUE
}

enum ShowOrder {
  ASC
  DESC
}

type ShowStat {
  count: Int!
  entity: ShowEntity!
}

type SiteSettings {
  copyrightText: String
  emailAddress: String
  id: String!
  language: String
  siteTitle: String
  siteUrl: String
  tagline: String
}

input SiteSettingsInput {
  copyrightText: String
  emailAddress: String
  language: String
  siteTitle: String
  siteUrl: String
  tagline: String
}

enum TextModeType {
  normal
  segmented
  token
}

type TextNode implements LexicalNode {
  detail: Int
  format: Int
  mode: TextModeType
  style: String
  text: String
  textFormat: Int
  textStyle: String
  type: String
  version: Int
}

input UpdateArtistInput {
  appleMusic: AppleMusicDataInput
  description: String
  excludeFromSearch: Boolean
  featuredMedia: [String]
  name: String
  slug: String
  website: String
}

input UpdateMediaUploadInput {
  altText: String
  caption: String
  description: String
  title: String
}

input UpdatePodcastInput {
  audio: String
  date: Float
  description: String
  image: String
  title: String!
}

input UpdatePostInput {
  artists: [String]
  date: Float
  editorState: EditorStateInput
  featuredMedia: [String]
  status: PostStatus
  summary: String
  title: String
}

input UpdateShowInput {
  artists: [String]
  attended: Boolean
  date: Float
  notes: String
  title: String
  url: String
  venue: String
}

input UpdateUserInput {
  bio: String
  email: String
  name: String
  password: String
  roles: [String]
}

input UpdateVenueInput {
  capacity: String
  city: String
  coordinates: VenueCoordinatesInput
  description: String
  excludeFromSearch: Boolean
  featuredMedia: [String]
  name: String
  permanentlyClosed: Boolean
  postalCode: String
  slug: String
  state: String
  streetAddress: String
  website: String
}

input UpdateVideoInput {
  dataId: String
  dataPlaylistId: String
  dataType: String
  position: Int
  publishedAt: Float
  publishedISO: String
  slug: String
  title: String
  year: Int
}

type User {
  bio: String
  email: String!
  id: String!
  name: String
  roles: [String]
}

type UserConnection {
  count: Int!
  edges: [UserEdge!]!
  pageInfo: PageInfo!
}

type UserEdge {
  cursor: String!
  node: User!
}

type Venue {
  address: String
  capacity: String
  city: String
  coordinates: VenueCoordinates
  description: String
  excludeFromSearch: Boolean
  featuredMedia: [MediaUpload!]
  id: String!
  name: String!
  permanentlyClosed: Boolean
  postalCode: String
  slug: String!
  state: String
  streetAddress: String
  website: String
}

type VenueConnection {
  count: Int!
  edges: [VenueEdge!]!
  pageInfo: PageInfo!
}

type VenueCoordinates {
  latitude: Float
  longitude: Float
}

input VenueCoordinatesInput {
  latitude: Float
  longitude: Float
}

type VenueEdge {
  cursor: String!
  node: Venue!
}

type Video {
  createdAt: Float!
  dataId: String!
  dataPlaylistId: String!
  dataType: String!
  id: String!
  position: Int!
  publishedAt: Float!
  publishedISO: String!
  slug: String!
  thumbnails: [VideoThumbnail!]!
  title: String!
  updatedAt: Float!
  year: Int!
}

type VideoConnection {
  count: Int!
  edges: [VideoEdge!]!
  pageInfo: PageInfo!
  years: [Int!]
}

type VideoEdge {
  cursor: String!
  node: Video!
}

type VideoNode implements ElementNodeType & LexicalNode {
  children: [EditorNode]
  direction: ElementDirection
  format: Int
  indent: Int
  type: String
  version: Int
  video: Video
}

type VideoThumbnail {
  height: Int!
  url: String!
  width: Int!
}

type VideoUpload implements MediaUpload {
  description: String
  destination: String!
  duration: Float
  fileName: String!
  fileSize: Int!
  height: Int
  id: String!
  mimeType: String!
  originalName: String!
  title: String
  type: String!
  width: Int
}