[build]
watchPatterns = ["graphql/**", "shared/**"]
installCommand = "corepack enable && pnpm install"
buildCommand = "pnpm --filter @highforthis/graphql build"

[deploy]
startCommand = "pnpm --filter @highforthis/graphql start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
